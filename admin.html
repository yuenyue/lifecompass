<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライフコンパス 管理画面</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&family=Noto+Sans+JP:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #fff5f9; min-height: 100vh; color: #3d2c35; }
body { background-image: radial-gradient(ellipse at 10% 10%, rgba(252,207,232,0.6) 0%, transparent 50%), radial-gradient(ellipse at 90% 90%, rgba(204,251,241,0.5) 0%, transparent 50%); }
.hidden { display: none !important; }
.page { min-height: 100vh; }
.center-page { display: flex; align-items: center; justify-content: center; padding: 2rem; }
.card { background: white; border-radius: 20px; padding: 3rem 2.5rem; max-width: 440px; width: 100%; box-shadow: 0 8px 40px rgba(244,114,182,0.2); text-align: center; }
.title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 1.6rem; font-weight: 700; color: #f472b6; margin-bottom: 0.3rem; }
.sub { font-size: 0.85rem; color: #8b6875; margin-bottom: 2rem; line-height: 1.8; }
.pw-input { width: 100%; padding: 0.9rem 1.2rem; border: 2px solid #fbcfe8; border-radius: 50px; font-size: 1rem; outline: none; text-align: center; letter-spacing: 0.2em; background: #fdf2f8; color: #3d2c35; margin-bottom: 0.8rem; }
.pw-input:focus { border-color: #f472b6; }
.error-msg { color: #ef4444; font-size: 0.82rem; margin-bottom: 0.8rem; min-height: 1.2rem; }
.btn-pink { background: linear-gradient(135deg, #f472b6, #ec4899); color: white; border: none; border-radius: 50px; padding: 0.9rem 2rem; font-family: 'Zen Maru Gothic', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(244,114,182,0.4); width: 100%; margin-bottom: 0.8rem; }
.btn-outline { background: white; color: #f472b6; border: 2px solid #fbcfe8; border-radius: 50px; padding: 0.7rem 1.5rem; font-size: 0.88rem; cursor: pointer; }
.admin-wrap { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
.admin-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2rem; }
.admin-header img { width: 40px; height: 40px; border-radius: 10px; }
.admin-header-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 1.3rem; font-weight: 700; color: #f472b6; }
.admin-header-sub { font-size: 0.78rem; color: #8b6875; }
.panel { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 4px 24px rgba(244,114,182,0.15); margin-bottom: 1.5rem; }
.panel-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 1rem; font-weight: 700; color: #3d2c35; margin-bottom: 1.2rem; }
.form-label { font-size: 0.82rem; color: #8b6875; margin-bottom: 0.4rem; display: block; font-weight: 500; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.input-wrap { display: flex; gap: 0.5rem; }
.admin-input { padding: 0.7rem 1rem; border: 1.5px solid #f0e0ea; border-radius: 12px; font-size: 0.88rem; outline: none; background: #fdf2f8; color: #3d2c35; width: 100%; }
.admin-input:focus { border-color: #f472b6; }
.btn-gen { background: #fce7f3; border: 1px solid #fbcfe8; color: #f472b6; border-radius: 8px; padding: 0.5rem 0.8rem; font-size: 0.78rem; cursor: pointer; white-space: nowrap; }
.preset-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
.preset-btn { padding: 0.4rem 0.9rem; border-radius: 50px; border: 1.5px solid #fbcfe8; background: white; font-size: 0.82rem; cursor: pointer; color: #8b6875; }
.preset-btn.on { background: #f472b6; color: white; border-color: #f472b6; }
.preview-text { font-size: 0.82rem; color: #f472b6; font-weight: 500; min-height: 1.2rem; margin-top: 0.3rem; }
.btn-issue { background: linear-gradient(135deg, #f472b6, #ec4899); color: white; border: none; border-radius: 50px; padding: 0.8rem 2rem; font-family: 'Zen Maru Gothic', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
.codes-list { display: flex; flex-direction: column; gap: 0.6rem; }
.code-item { background: #fdf2f8; border-radius: 12px; padding: 1rem 1.2rem; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
.code-main { flex: 1; min-width: 150px; }
.code-text { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; color: #3d2c35; }
.code-note { font-size: 0.75rem; color: #8b6875; }
.code-expiry { font-size: 0.8rem; color: #8b6875; }
.tag { padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
.tag-valid { background: #dcfce7; color: #15803d; }
.tag-expired { background: #fee2e2; color: #dc2626; }
.tag-unlimited { background: #ccfbf1; color: #0f766e; }
.btn-copy { background: #fce7f3; border: 1px solid #fbcfe8; color: #f472b6; border-radius: 8px; padding: 0.25rem 0.7rem; font-size: 0.72rem; cursor: pointer; }
.btn-del { background: none; border: 1px solid #fca5a5; color: #ef4444; border-radius: 8px; padding: 0.25rem 0.7rem; font-size: 0.72rem; cursor: pointer; }
.refresh-btn { background: #ccfbf1; border: 1px solid #99f6e4; color: #0f766e; border-radius: 8px; padding: 0.3rem 0.8rem; font-size: 0.78rem; cursor: pointer; }
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#f472b6,#ec4899); color: white; padding: 0.8rem 2rem; border-radius: 50px; font-size: 0.88rem; font-weight: 700; opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
@media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="page-login" class="page center-page">
  <div class="card">
    <div style="font-size:2.5rem;margin-bottom:0.5rem;">⚙️</div>
    <div class="title">管理者ログイン</div>
    <div class="sub">販売者専用ページです。<br>管理者パスワードを入力してください。</div>
    <input class="pw-input" type="password" id="pw-field" placeholder="管理者パスワード">
    <div class="error-msg" id="pw-error"></div>
    <button class="btn-pink" id="login-btn">ログイン →</button>
    <div><a href="index.html" style="font-size:0.78rem;color:#8b6875;">← ゲームページに戻る</a></div>
  </div>
</div>

      </div>
      <div class="codes-list" id="codes-list">
        <div style="text-align:center;color:#8b6875;padding:1rem;">読み込み中…</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
(function() {
  var cfg = {
    apiKey: "AIzaSyDhyDvxjrO6qf8YDRAMH78PoQFSXeoWbi4",
    authDomain: "lifecompass-a1c72.firebaseapp.com",
    databaseURL: "https://lifecompass-a1c72-default-rtdb.firebaseio.com",
    projectId: "lifecompass-a1c72",
    storageBucket: "lifecompass-a1c72.firebasestorage.app",
    messagingSenderId: "92097564622",
    appId: "1:92097564622:web:0229db858282e95bae259f"
  };
  firebase.initializeApp(cfg);
  var db = firebase.database();

  var ADMIN_PW = 'admin-lifecompass';
  var selectedExpiry = undefined;

  var presets = [
    { label: '30日間', days: 30 },
    { label: '3ヶ月', days: 90 },
    { label: '6ヶ月', days: 180 },
    { label: '1年', days: 365 },
    { label: '期限なし', days: 0 },
    { label: '日付を指定', days: -1 }
  ];

  function init() {
    // プリセットボタン生成
    var row = document.getElementById('preset-row');
    presets.forEach(function(p) {
      var btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = p.label;
      btn.onclick = function() {
        document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('on'); });
        btn.classList.add('on');
        document.getElementById('custom-date-row').classList.add('hidden');
        if (p.days === -1) {
          document.getElementById('custom-date-row').classList.remove('hidden');
          document.getElementById('expiry-preview').textContent = 'カレンダーから日付を選んでください';
          selectedExpiry = undefined;
          document.getElementById('new-expiry').onchange = function() {
            selectedExpiry = this.value;
            document.getElementById('expiry-preview').textContent = '有効期限：' + selectedExpiry + ' まで';
          };
        } else if (p.days === 0) {
          selectedExpiry = null;
          document.getElementById('expiry-preview').textContent = '期限なしで発行されます';
        } else {
          var d = new Date();
          d.setDate(d.getDate() + p.days);
          selectedExpiry = d.toISOString().split('T')[0];
          document.getElementById('expiry-preview').textContent = '有効期限：' + selectedExpiry + ' まで';
        }
      };
      row.appendChild(btn);
    });

    // ボタンイベント
    document.getElementById('login-btn').onclick = doLogin;
    document.getElementById('pw-field').onkeydown = function(e) { if (e.key === 'Enter') doLogin(); };
    document.getElementById('logout-btn').onclick = doLogout;
    document.getElementById('gen-btn').onclick = autoGen;
    document.getElementById('issue-btn').onclick = issueCode;
    document.getElementById('refresh-btn').onclick = loadCodes;
  }

  function doLogin() {
    var pw = document.getElementById('pw-field').value.trim();
    if (pw === ADMIN_PW) {
      document.getElementById('page-login').classList.add('hidden');
      document.getElementById('page-admin').classList.remove('hidden');
      loadCodes();
    } else {
      document.getElementById('pw-error').textContent = 'パスワードが正しくありません';
    }
  }

  function doLogout() {
    document.getElementById('page-admin').classList.add('hidden');
    document.getElementById('page-login').classList.remove('hidden');
    document.getElementById('pw-field').value = '';
  }

  function autoGen() {
    var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    var code = '';
    for (var i = 0; i < 8; i++) code += c[Math.floor(Math.random() * c.length)];
    document.getElementById('new-code').value = code;
  }

  function issueCode() {
    var code = document.getElementById('new-code').value.trim();
    var name = document.getElementById('new-name').value.trim();
    if (!code) { alert('アクセスコードを入力してください'); return; }
    if (selectedExpiry === undefined) { alert('有効期限を選択してください'); return; }
    db.ref('access_codes').push({
      code: code, expiry: selectedExpiry, name: name, createdAt: Date.now()
    }).then(function() {
      document.getElementById('new-code').value = '';
      document.getElementById('new-name').value = '';
      selectedExpiry = undefined;
      document.getElementById('expiry-preview').textContent = '';
      document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('on'); });
      loadCodes();
      toast('コードを発行しました：' + code);
    });
  }

  function loadCodes() {
    var el = document.getElementById('codes-list');
    el.innerHTML = '<div style="text-align:center;color:#8b6875;padding:1rem;">読み込み中…</div>';
    db.ref('access_codes').once('value').then(function(snap) {
      if (!snap.exists()) {
        el.innerHTML = '<div style="text-align:center;color:#8b6875;padding:1rem;">まだコードが発行されていません</div>';
        return;
      }
      var today = new Date(); today.setHours(0,0,0,0);
      var items = [];
      snap.forEach(function(c) { items.push({ key: c.key, val: c.val() }); });
      items.sort(function(a,b) { return (b.val.createdAt||0) - (a.val.createdAt||0); });
      el.innerHTML = '';
      items.forEach(function(item) {
        var p = item.val;
        var tagClass, tagText;
        if (!p.expiry) { tagClass = 'tag-unlimited'; tagText = '期限なし'; }
        else {
          var exp = new Date(p.expiry); exp.setHours(23,59,59,999);
          tagClass = today > exp ? 'tag-expired' : 'tag-valid';
          tagText = today > exp ? '期限切れ' : '有効';
        }
        var div = document.createElement('div');
        div.className = 'code-item';
        div.innerHTML = '<div class="code-main"><div class="code-text">' + p.code + '</div><div class="code-note">' + (p.name||'') + '</div></div>'
          + '<div class="code-expiry">期限：' + (p.expiry||'—') + '</div>'
          + '<span class="tag ' + tagClass + '">' + tagText + '</span>';
        var copyBtn = document.createElement('button');
        copyBtn.className = 'btn-copy';
        copyBtn.textContent = 'コピー';
        copyBtn.onclick = function() {
          navigator.clipboard.writeText(p.code).then(function() { toast('コピーしました：' + p.code); });
        };
        var delBtn = document.createElement('button');
        delBtn.className = 'btn-del';
        delBtn.textContent = '削除';
        delBtn.onclick = function() {
          if (confirm('このコードを削除しますか？')) {
            db.ref('access_codes/' + item.key).remove().then(function() { loadCodes(); toast('削除しました'); });
          }
        };
        div.appendChild(copyBtn);
        div.appendChild(delBtn);
        el.appendChild(div);
      });
    });
  }

  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 3000);
  }

  init();
})();
</script>
</body>
</html>
